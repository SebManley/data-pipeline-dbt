name: data_pipeline_dbt
version: '1.0.0'
config-version: 2

profile: data_pipeline_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_pipeline_dbt:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

vars:
  # The source dataset's final ~6 weeks (from 2018-09-01) contain only a sparse trailing
  # sample rather than complete data — order volume tapers off day-by-day rather than
  # stopping at a real business event. Marts exclude orders placed on/after this date so
  # trend charts aren't skewed by a misleading drop-off. See fct_orders.sql.
  max_complete_order_date: '2018-09-01'

seeds:
  data_pipeline_dbt:
    +schema: raw
    olist_orders:
      +column_types:
        order_purchase_timestamp: timestamp
        order_approved_at: timestamp
        order_delivered_carrier_date: timestamp
        order_delivered_customer_date: timestamp
        order_estimated_delivery_date: timestamp
    olist_order_items:
      +column_types:
        shipping_limit_date: timestamp
        price: numeric
        freight_value: numeric
