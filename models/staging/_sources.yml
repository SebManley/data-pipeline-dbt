version: 2

sources:
  - name: olist
    description: >
      Raw Olist Brazilian e-commerce data. Loaded via `dbt seed` (sample) or
      `scripts/load_source_data.py` (full Kaggle dataset).
    schema: raw
    tables:
      - name: olist_customers
        description: One row per customer_id. customer_unique_id deduplicates repeat buyers.
        columns:
          - name: customer_id
            description: Surrogate key — unique per order, not per real customer.
            tests:
              - not_null
              - unique
          - name: customer_unique_id
            tests:
              - not_null
          - name: customer_zip_code_prefix
            tests:
              - not_null
          - name: customer_city
            tests:
              - not_null
          - name: customer_state
            tests:
              - not_null

      - name: olist_orders
        description: One row per order.
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
              - relationships:
                  to: source('olist', 'olist_customers')
                  field: customer_id
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ['delivered', 'shipped', 'canceled', 'processing',
                           'approved', 'unavailable', 'invoiced', 'created']

      - name: olist_order_items
        description: One row per order line item.
        columns:
          - name: order_id
            tests:
              - not_null
              - relationships:
                  to: source('olist', 'olist_orders')
                  field: order_id
          - name: order_item_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
              - relationships:
                  to: source('olist', 'olist_products')
                  field: product_id
          - name: price
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: "> 0"
          - name: freight_value
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: ">= 0"

      - name: olist_products
        description: One row per product_id, with category (Portuguese) and physical attributes.
        columns:
          - name: product_id
            tests:
              - not_null
              - unique
          - name: product_category_name
            description: Category name in Portuguese — join to olist_category_translation for English.

      - name: olist_category_translation
        description: Lookup mapping Portuguese product_category_name to English.
        columns:
          - name: product_category_name
            tests:
              - not_null
              - unique
          - name: product_category_name_english
            tests:
              - not_null
