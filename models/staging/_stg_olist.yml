version: 2

models:
  - name: stg_olist__customers
    description: Renamed and cleaned customer records. One row per customer_id.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: state_code
        tests:
          - not_null

  - name: stg_olist__orders
    description: >
      Renamed orders with typed timestamps and convenience boolean flags.
      One row per order_id.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'processing',
                       'approved', 'unavailable', 'invoiced', 'created']
      - name: purchased_at
        tests:
          - not_null
      - name: is_delivered
        tests:
          - not_null
      - name: is_cancelled
        tests:
          - not_null

  - name: stg_olist__order_items
    description: >
      Renamed order line items with numeric casts and a computed line_total.
      Grain: order_id + order_item_id.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: freight_value
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null

  - name: stg_olist__products
    description: >
      One row per product_id with its category, translated to English where
      a translation exists (falls back to the Portuguese name otherwise).
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_category
        tests:
          - not_null
